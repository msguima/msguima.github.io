{{ define "main" }}
<div class="page-wrap">
  {{ if .Params.breadcrumb }}
  <div class="breadcrumb">
    <a href="/">Início</a> <span>›</span>
    {{ range .Params.breadcrumb }}
    <a href="{{ .url }}">{{ .name }}</a> <span>›</span>
    {{ end }}
    {{ .Title }}
  </div>
  {{ end }}

  <div class="page-header">
    <h1>{{ .Title }}</h1>
    {{ with .Params.subtitle }}<p class="text-muted">{{ . }}</p>{{ end }}
  </div>

  <article>
    {{ .Content }}
  </article>
</div>
{{ end }}
