<nav class="site-nav">
  <div class="nav-inner">
    <a href="/" class="nav-brand">M. S. Guimarães</a>
    <button class="nav-toggle" id="navToggle" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links" id="navLinks">
      {{ range .Site.Menus.main }}

          {{ .Name }}
        </a>
      </li>
      {{ end }}
    </ul>
  </div>
